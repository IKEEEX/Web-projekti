<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="../tyylit/tyylit_t7.css">
</head>
<body>

    <button id="themeBtn">Tumma teema</button>
    <h1>Web-ohjelmoinnin portfolio</h1>
    <p>Tämä on Web-ohjelmoinnissa tehdyn portfolion etusivu</p>
    <p>Muut sivut:</p>
    <ol>
        <li><a href="elementteja.html" target="_blank">Elementtejä</a></li>
        <li><a href="muotoiluja.html" target="_blank">Muotoiluja</a></li>
        <li><a href="tyylisivuista.html" target="_blank">Tyylisivuista</a></li>
        <li><a href="https://www.youtube.com/watch?v=xvFZjo5PgG0" target="_blank">Hauska linkki</a></li>
    </ol>
    
    <script>
    const btn = document.getElementById("themeBtn");

    btn.addEventListener("click", function () {
        document.body.classList.toggle("dark");

        if (document.body.classList.contains("dark")) {
            btn.textContent = "Vaalea teema";
        } else {
            btn.textContent = "Tumma teema";
        }
    });
    </script>
    
</body>
</html>
